<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Messages PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f1c2c,#928dab);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.form{
  background:white;
  width:380px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  text-align:center;
}
textarea{
  width:100%;
  height:100px;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  font-size:16px;
  margin-top:10px;
}
.link{
  background:#eee;
  padding:10px;
  border-radius:10px;
  word-break:break-all;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="form" id="sendPage">
<h2>💌 أرسل رسالة</h2>

<textarea id="msg" placeholder="اكتب الرسالة"></textarea>

<button onclick="sendMsg()">📤 إرسال</button>

<div id="result" class="link" style="display:none;"></div>

<button id="copyBtn" style="display:none;" onclick="copyLink()">📋 نسخ الرابط</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAtzAi4uskhYAMnS5jUFXnoqymCMuUYvn4",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 إرسال الرسالة
function sendMsg(){

  let m = document.getElementById("msg").value;

  if(m==""){alert("اكتب رسالة");return;}

  db.collection("messages").add({
    text: m
  }).then((docRef)=>{

    let link = window.location.origin + window.location.pathname + "?msg=" + docRef.id;

    document.getElementById("result").style.display="block";
    document.getElementById("copyBtn").style.display="block";

    document.getElementById("result").innerText = link;

  });

}

// 📋 نسخ الرابط
function copyLink(){
  let link = document.getElementById("result").innerText;
  navigator.clipboard.writeText(link);
  alert("تم النسخ 🔥");
}

// 🔥 قراءة الرسالة
let params = new URLSearchParams(window.location.search);
let msgId = params.get("msg");

if(msgId){

  document.body.innerHTML = "<h2 style='color:white;text-align:center;'>⏳ جاري التحميل...</h2>";

  setTimeout(async ()=>{

    let doc = await db.collection("messages").doc(msgId).get();

    if(doc.exists){

      document.body.innerHTML = `
        <div style="text-align:center;color:white;margin-top:100px;">
          <h1>💌 رسالة سرية</h1>
          <div style="background:#1f1f1f;padding:20px;border-radius:20px;margin:20px;font-size:22px;">
            ${doc.data().text}
          </div>
        </div>
      `;

      await db.collection("messages").doc(msgId).delete();

    }else{
      document.body.innerHTML="<h2 style='color:white'>❌ الرسالة اختفت</h2>";
    }

  },1000);
}

</script>

</body>
</html>
