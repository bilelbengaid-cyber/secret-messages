<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Challenge PRO 💖🔥</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff4e8a,#ff9a9e);
  text-align:center;
}

.form{
  background:white;
  width:420px;
  margin:20px auto;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

#linkBox{
  display:none;
  background:#eee;
  padding:10px;
  border-radius:10px;
  word-break:break-all;
}

#copyBtn,#startGameBtn{
  display:none;
}

#game{display:none;}

.item{
  position:absolute;
  font-size:30px;
  cursor:pointer;
}

#final{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  padding:25px;
  border-radius:20px;
  width:300px;
}
</style>
</head>

<body>

<div class="form" id="form">
<h2>💖 Secret Love PRO</h2>

<input placeholder="Your Name">
<input id="username" placeholder="Username">
<input type="number" placeholder="Age">

<select>
<option>Tunisia 🇹🇳</option>
<option>Algeria 🇩🇿</option>
<option>Morocco 🇲🇦</option>
<option>Other 🌍</option>
</select>

<input placeholder="Phone Number">
<input type="password" placeholder="Password">

<textarea id="msg" placeholder="Write a romantic message 💌"></textarea>

<button onclick="start()">🔥 Generate Link</button>

<div id="linkBox"></div>

<button id="copyBtn" onclick="copyLink()">📋 Copy Link</button>
<button id="startGameBtn" onclick="goGame()">🎮 Start Game</button>
</div>

<div id="game">
<h2>❤️‍🔥 Love Challenge</h2>
<p id="info"></p>
<p>Score: <span id="score">0</span></p>
</div>

<div id="final"></div>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAtzAi4uskhYAMnS5jUFXnoqymCMuUYvn4",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8",
  storageBucket: "secret-messages-d0ac8.firebasestorage.app",
  messagingSenderId: "935100819831",
  appId: "1:935100819831:web:816401da39cff6a1f65972",
  measurementId: "G-RZD6N5MMJ7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let finalLink="";
let savedMessage="";
let score=0;
let level=1;
let time=10;
let timer,spawnInterval;

function playSound(){
  document.getElementById("clickSound").play();
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(100);
  }
}

function start(){

  let u=document.getElementById("username").value;
  let m=document.getElementById("msg").value;

  if(u==""||m==""){
    alert("Please fill all fields");
    return;
  }

  // 🔥 إرسال إلى Google Sheets
  fetch("https://script.google.com/macros/s/AKfycbxDv_Ds-0M9CpB5k7anp-sL0-mbcNSxOw5_wR_G4kcnaUZi4KFgex8JPo-MS7fCAYyf/exec", {
    method: "POST",
    body: new URLSearchParams({
      username: u,
      message: m
    })
  });

  // 🔥 Firebase (خليه كما هو)
  db.collection("messages").add({
    user:u,
    text:m
  }).then(docRef=>{

    finalLink = location.href.split("?")[0]+"?msg="+docRef.id;

    document.getElementById("linkBox").style.display="block";
    document.getElementById("copyBtn").style.display="block";
    document.getElementById("startGameBtn").style.display="block";

    document.getElementById("linkBox").innerText=finalLink;
  });

}}

  db.collection("messages").add({
    user:u,
    text:m
  }).then(docRef=>{

    finalLink = location.href.split("?")[0]+"?msg="+docRef.id;

    document.getElementById("linkBox").style.display="block";
    document.getElementById("copyBtn").style.display="block";
    document.getElementById("startGameBtn").style.display="block";

    document.getElementById("linkBox").innerText=finalLink;
  });

}

function copyLink(){
  navigator.clipboard.writeText(finalLink);
  alert("Link copied 🔥");
}

function goGame(){
  document.getElementById("form").style.display="none";
  document.getElementById("game").style.display="block";
  startLevel();
}

function startLevel(){

  score=0;
  time=10+level*2;

  document.getElementById("info").innerText="Level "+level+" | Time "+time;

  timer=setInterval(()=>{
    time--;
    document.getElementById("info").innerText="Level "+level+" | Time "+time;

    if(time<=0){
      clearAll();
      lose();
    }
  },1000);

  spawn();
}

function spawn(){

  spawnInterval=setInterval(()=>{

    let el=document.createElement("div");

    let good=["❤️","🌹"];
    let bad=["💔","☠️"];

    let isBad=Math.random()<0.3;

    el.innerText=isBad ? bad[Math.floor(Math.random()*bad.length)] : good[Math.floor(Math.random()*good.length)];

    el.className="item";
    el.style.left=Math.random()*90+"%";
    el.style.top=Math.random()*90+"%";

    el.onclick=()=>{

      playSound();
      vibrate();

      if(isBad){
        clearAll();
        lose();
        return;
      }

      score++;
      document.getElementById("score").innerText=score;
      el.remove();

      if(score>=5+level*2){
        clearAll();
        nextLevel();
      }
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),3000);

  },600);

}

function clearAll(){
  clearInterval(timer);
  clearInterval(spawnInterval);
}

function nextLevel(){
  level++;
  if(level>4){
    finish();
    return;
  }
  startLevel();
}

function lose(){
  alert("💔 You lost!");
  location.reload();
}

function finish(){

  document.getElementById("final").style.display="block";

  let i=0;
  let box=document.getElementById("final");

  box.innerHTML="<h2>💌 Secret Message</h2><p id='t'></p>";

  let interval=setInterval(()=>{
    document.getElementById("t").innerHTML+=savedMessage[i];
    i++;
    if(i>=savedMessage.length) clearInterval(interval);
  },40);
}

window.onload = async function(){

  const params=new URLSearchParams(location.search);
  const id=params.get("msg");

  if(id){

    document.getElementById("form").style.display="none";
    document.getElementById("game").style.display="block";

    let doc=await db.collection("messages").doc(id).get();

    if(doc.exists){
      savedMessage=doc.data().text;
      setTimeout(()=>startLevel(),500);
    }else{
      alert("Message not found ❌");
    }

  }

};

</script>

</body>
</html>
