<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Challenge 💖🔥</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  overflow:hidden;
  color:white;
  text-align:center;
}

/* الفورميلار */
.form{
  background:white;
  color:black;
  width:400px;
  margin:40px auto;
  padding:30px;
  border-radius:20px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  font-size:16px;
  margin-top:10px;
  cursor:pointer;
}

/* صندوق الرابط */
#linkBox{
  display:none;
  background:#eee;
  color:black;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all;
}

/* اللعبة */
#game{display:none;}

.item{
  position:absolute;
  font-size:30px;
  cursor:pointer;
}

/* النهاية */
#final{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:30px;
  border-radius:20px;
  width:320px;
}
</style>
</head>

<body>

<!-- الفورميلار الكبيرة -->
<div class="form" id="form">
<h2>💖 Secret Love</h2>

<input placeholder="اسمك">
<input id="username" placeholder="Username">
<input type="number" placeholder="العمر">

<select>
<option>🇹🇳 تونس</option>
<option>🇩🇿 الجزائر</option>
<option>🇲🇦 المغرب</option>
</select>

<input placeholder="رقم الهاتف">
<input type="password" placeholder="Password">

<textarea id="msg" placeholder="اكتب رسالة رومانسية 💌"></textarea>

<button onclick="start()">🔥 ابدأ التحدي</button>

<!-- 🔥 هنا يظهر الرابط -->
<div id="linkBox"></div>
<button id="copyBtn" onclick="copyLink()" style="display:none;">📋 نسخ الرابط</button>

</div>

<!-- اللعبة -->
<div id="game">
<h2>❤️‍🔥 Love Challenge</h2>
<p id="info">Level: 1 | Time: <span id="time">10</span></p>
<p>Score: <span id="score">0</span></p>
</div>

<div id="final"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let score=0;
let level=1;
let time=10;
let savedMessage="";
let timer;
let finalLink="";

// البداية
function start(){

  let u=document.getElementById("username").value;
  let m=document.getElementById("msg").value;

  if(u==""||m==""){
    alert("عمر الخانات");
    return;
  }

  db.collection("messages").add({
    user:u,
    text:m
  }).then(docRef=>{

    finalLink = window.location.href.split("?")[0] + "?msg=" + docRef.id;

    // 🔥 عرض الرابط بدل alert
    document.getElementById("linkBox").style.display="block";
    document.getElementById("copyBtn").style.display="block";
    document.getElementById("linkBox").innerText = finalLink;

  });

  savedMessage = m;

  document.getElementById("form").style.display="none";
  document.getElementById("game").style.display="block";

  startLevel();
}

// نسخ الرابط
function copyLink(){
  navigator.clipboard.writeText(finalLink);
  alert("✅ تم نسخ الرابط!");
}

// كل مرحلة
function startLevel(){

  score=0;
  time=10 + (level*2);

  document.getElementById("time").innerText=time;
  document.getElementById("score").innerText=score;
  document.getElementById("info").innerText="Level: "+level+" | Time: "+time;

  timer=setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;

    if(time<=0){
      clearInterval(timer);
      lose();
    }
  },1000);

  spawnItems();
}

// عناصر اللعبة
function spawnItems(){

  let speed = 800 - (level*100);

  let interval=setInterval(()=>{

    let el=document.createElement("div");

    let good=["❤️","🌹"];
    let bad=["💔","☠️"];

    let isBad=Math.random()<0.3;

    el.innerText = isBad ? bad[Math.floor(Math.random()*bad.length)] : good[Math.floor(Math.random()*good.length)];

    el.className="item";
    el.style.left=Math.random()*90+"%";
    el.style.top=Math.random()*90+"%";

    el.onclick=()=>{

      if(isBad){
        lose();
        return;
      }

      score++;
      document.getElementById("score").innerText=score;
      el.remove();

      if(score >= 5 + level*2){
        clearInterval(interval);
        clearInterval(timer);
        nextLevel();
      }
    };

    document.body.appendChild(el);

  },speed);

}

// المرحلة التالية
function nextLevel(){

  level++;

  if(level>4){
    finish();
    return;
  }

  startLevel();
}

// خسارة
function lose(){
  alert("💔 خسرت! حاول مرة أخرى");
  location.reload();
}

// النهاية
function finish(){

  document.getElementById("final").style.display="block";

  let i=0;
  let box=document.getElementById("final");
  box.innerHTML="<h2>💌 شخص يحبك</h2><p id='text'></p>";

  let interval=setInterval(()=>{
    document.getElementById("text").innerHTML+=savedMessage[i];
    i++;
    if(i>=savedMessage.length) clearInterval(interval);
  },40);
}

// قراءة الرابط
window.onload = async function(){

  const params = new URLSearchParams(window.location.search);
  const msgId = params.get("msg");

  if(msgId){

    let doc = await db.collection("messages").doc(msgId).get();

    if(doc.exists){

      document.getElementById("form").style.display="none";
      document.getElementById("game").style.display="block";

      savedMessage = doc.data().text;

      startLevel();

    }

  }

};

</script>

</body>
</html>
