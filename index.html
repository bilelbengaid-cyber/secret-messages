<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Big Form PRO</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#4facfe,#00f2fe);
}

.form{
  width:450px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

input,select,textarea{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="form">
<h2>🔥 Formulaire Complet</h2>

<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="age" type="number" placeholder="Age">

<input id="email" type="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<input id="password" type="password" placeholder="Password">

<select id="pays">
<option value="">Pays</option>
<option>Tunisie</option>
<option>France</option>
<option>Maroc</option>
<option>Algerie</option>
</select>

<p>Genre:</p>
<input type="radio" name="genre" value="Homme"> Homme
<input type="radio" name="genre" value="Femme"> Femme

<p>Hobbies:</p>
<input type="checkbox" name="hobbie" value="Sport"> Sport
<input type="checkbox" name="hobbie" value="Music"> Music
<input type="checkbox" name="hobbie" value="Gaming"> Gaming

<textarea id="message" placeholder="Message..."></textarea>

<button onclick="send()">Envoyer 🚀</button>

</div>

<script>
function send(){

  let nom=document.getElementById("nom").value;
  let prenom=document.getElementById("prenom").value;
  let age=document.getElementById("age").value;
  let email=document.getElementById("email").value;
  let phone=document.getElementById("phone").value;
  let password=document.getElementById("password").value;
  let pays=document.getElementById("pays").value;
  let message=document.getElementById("message").value;

  let genre=document.querySelector('input[name="genre"]:checked')?.value || "";
  let hobbies=[...document.querySelectorAll('input[name="hobbie"]:checked')].map(el=>el.value).join(",");

  fetch("https://script.google.com/macros/s/AKfycby4_Jwh7IVeJeF9Z3UzK0osQY-FaJsmZNpfXBwWN1A3rGSUcjag0xz6wD_uE3t9hfyK/exec", {
    method:"POST",
    mode:"no-cors",
    body:new URLSearchParams({
      nom,prenom,age,email,phone,password,pays,genre,hobbies,message
    })
  });

  alert("✅ Envoyé !");
}
</script>

</body>
</html>
