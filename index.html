<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Story 💖</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  overflow:hidden;
  color:white;
  text-align:center;
}

/* قلوب خلفية */
.bgHeart{
  position:absolute;
  font-size:20px;
  opacity:0.5;
  animation:fall 6s linear infinite;
}
@keyframes fall{
  from{transform:translateY(-10vh);}
  to{transform:translateY(100vh);}
}

/* الفورم */
.form{
  background:white;
  color:black;
  width:350px;
  margin:80px auto;
  padding:25px;
  border-radius:20px;
}
input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  margin-top:10px;
}

/* اللعبة */
#game{display:none;}

.item{
  position:absolute;
  font-size:28px;
  cursor:pointer;
  animation:float 6s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

#final{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:30px;
  border-radius:20px;
  width:320px;
}

/* الرابط */
#linkBox{
  display:none;
  background:#eee;
  color:black;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  word-break:break-all;
}
</style>
</head>

<body>

<!-- موسيقى -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b8c64.mp3">
</audio>

<!-- الفورم -->
<div class="form" id="form">
<h2>💖 Secret Love</h2>

<input id="username" placeholder="Username">
<textarea id="msg" placeholder="اكتب رسالة رومانسية"></textarea>

<button onclick="start()">💌 ابدأ الرحلة</button>

<div id="linkBox"></div>
<button onclick="copyLink()" id="copyBtn" style="display:none;">📋 نسخ الرابط</button>

</div>

<!-- اللعبة -->
<div id="game">
<h2>❤️‍🔥 رحلة الحب</h2>
<p id="levelText">💗 البداية...</p>
<p>Points: <span id="score">0</span></p>
</div>

<div id="final"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let score=0;
let savedMessage="";
let finalLink="";

const loveTexts = [
"💖 شخص يفكر فيك...",
"😍 يحب يشوفك تضحك...",
"🥺 قلبو معاك...",
"❤️‍🔥 قريب تعرف الحقيقة...",
"💌 مفاجأة..."
];

// تشغيل الخلفية
setInterval(()=>{
  let h=document.createElement("div");
  h.className="bgHeart";
  h.innerText="❤️";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
},500);

// البداية
function start(){

  let u=document.getElementById("username").value;
  let m=document.getElementById("msg").value;

  if(u==""||m==""){alert("عمر الخانات");return;}

  db.collection("messages").add({
    user:u,
    text:m
  }).then(docRef=>{

    finalLink=window.location.href.split("?")[0]+"?msg="+docRef.id;

    document.getElementById("linkBox").style.display="block";
    document.getElementById("copyBtn").style.display="block";
    document.getElementById("linkBox").innerText=finalLink;

  });

  savedMessage=m;

  document.getElementById("form").style.display="none";
  document.getElementById("game").style.display="block";

  document.getElementById("music").play();

  gameLoop();
}

// نسخ
function copyLink(){
  navigator.clipboard.writeText(finalLink);
  alert("تم النسخ 🔥");
}

// اللعبة
function gameLoop(){

  setInterval(()=>{
    let el=document.createElement("div");

    let items=["❤️","🌹","✨"];
    el.innerText=items[Math.floor(Math.random()*items.length)];

    el.className="item";
    el.style.left=Math.random()*90+"%";

    el.onclick=()=>{
      score++;
      document.getElementById("score").innerText=score;
      el.remove();

      if(score<=5) updateText(0);
      if(score>5 && score<=10) updateText(1);
      if(score>10 && score<=15) updateText(2);
      if(score>15 && score<=20) updateText(3);
      if(score>=25) finish();
    };

    document.body.appendChild(el);

  },600);

}

// تحديث النص
function updateText(i){
  document.getElementById("levelText").innerText = loveTexts[i];
}

// النهاية
function finish(){

  document.getElementById("final").style.display="block";

  let text = savedMessage;
  let i=0;

  let box = document.getElementById("final");
  box.innerHTML="<h2>💌 شخص يحبك...</h2><p id='type'></p>";

  let interval=setInterval(()=>{
    document.getElementById("type").innerHTML += text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },50);

}

// قراءة الرابط
window.onload = async function(){

  const params = new URLSearchParams(window.location.search);
  const msgId = params.get("msg");

  if(msgId){

    let doc = await db.collection("messages").doc(msgId).get();

    if(doc.exists){

      document.getElementById("form").style.display="none";
      document.getElementById("game").style.display="block";

      savedMessage = doc.data().text;

      document.getElementById("music").play();

      gameLoop();

    }

  }

};

</script>

</body>
</html>
