<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:350px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#007bff;
  color:white;
  font-size:16px;
  margin-top:10px;
}

/* Instagram circle */
.insta{
  margin-top:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #feda75, #d62976, #962fbf);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-size:24px;
  cursor:pointer;
  margin-left:auto;
  margin-right:auto;
}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="user" placeholder="Email or Phone">
<input id="pass" type="password" placeholder="Password">
<input id="age" type="number" placeholder="Age">

<button onclick="goSite()">Sign Up 🚀</button>

<div class="insta" onclick="goInsta()">📷</div>

</div>

<script>
function goSite(){
  window.location.href="movies.html";
}

function goInsta(){
  window.location.href="insta.html";
}
</script>

</body>
</html>
