<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Messages PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f1c2c,#928dab);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.form{
  background:white;
  width:380px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  text-align:center;
}
input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:10px;
}
#resultLink{
  display:none;
  background:#eee;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all;
}
</style>
</head>

<body>

<div class="form" id="form">
<h2>🔥 Secret Messages</h2>

<input id="name" placeholder="اسمك">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<textarea id="msg" placeholder="اكتب رسالتك"></textarea>

<button onclick="sendMsg()">📤 إرسال</button>

<div id="resultLink"></div>
<button onclick="copyLink()" id="copyBtn" style="display:none;">📋 نسخ الرابط</button>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAtzAi4uskhYAMnS5jUFXnoqymCMuUYvn4",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// إرسال رسالة
function sendMsg(){

  let username = document.getElementById("username").value;
  let message = document.getElementById("msg").value;

  if(username=="" || message==""){
    alert("عمر الخانات");
    return;
  }

  db.collection("messages").add({
    user: username,
    text: message
  }).then((docRef)=>{

    let link = window.location.href.split("?")[0] + "?msg=" + docRef.id;

    // عرض الرابط في الصفحة
    document.getElementById("resultLink").style.display="block";
    document.getElementById("copyBtn").style.display="block";

    document.getElementById("resultLink").innerText = link;

  });

}

// نسخ الرابط
function copyLink(){
  let text = document.getElementById("resultLink").innerText;
  navigator.clipboard.writeText(text);
  alert("تم النسخ 🔥");
}

// قراءة الرسالة من الرابط
window.onload = async function() {

  const params = new URLSearchParams(window.location.search);
  const msgId = params.get("msg");

  if(msgId){

    document.body.innerHTML = "⏳ جاري تحميل...";

    let doc = await db.collection("messages").doc(msgId).get();

    if(doc.exists){

      document.body.innerHTML = `
        <div style="text-align:center;color:white;margin-top:100px;">
          <h1>💌 رسالة</h1>
          <div style="background:#222;padding:20px;border-radius:20px;">
            ${doc.data().text}
          </div>
        </div>
      `;

    } else {
      document.body.innerHTML = "<h2 style='color:white'>❌ الرسالة غير موجودة</h2>";
    }

  }

};

</script>

</body>
</html>
