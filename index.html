<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Challenge 💖🔥</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ff758c,#ff7eb3);
  color:white;
  text-align:center;
}

/* الفورم */
.form{
  background:white;
  color:black;
  width:400px;
  margin:40px auto;
  padding:30px;
  border-radius:20px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

#linkBox{
  display:none;
  background:#eee;
  color:black;
  padding:10px;
  border-radius:10px;
  word-break:break-all;
}

#copyBtn,#startGameBtn{
  display:none;
}

#game{display:none;}

.item{
  position:absolute;
  font-size:30px;
  cursor:pointer;
}

#final{
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:white;
  color:black;
  padding:30px;
  border-radius:20px;
  width:320px;
}
</style>
</head>

<body>

<div class="form" id="form">
<h2>💖 Secret Love</h2>

<input placeholder="اسمك">
<input id="username" placeholder="Username">
<textarea id="msg" placeholder="اكتب رسالة 💌"></textarea>

<button onclick="start()">🔥 إنشاء الرابط</button>

<div id="linkBox"></div>

<button id="copyBtn" onclick="copyLink()">📋 نسخ الرابط</button>
<button id="startGameBtn" onclick="goGame()">🎮 ابدأ اللعبة</button>

</div>

<div id="game">
<h2>❤️‍🔥 Love Challenge</h2>
<p id="info">Level: 1 | Time: <span id="time">10</span></p>
<p>Score: <span id="score">0</span></p>
</div>

<div id="final"></div>

<script>

// 🔥 حط CONFIG متاعك الصحيح هنا
const firebaseConfig = {
  apiKey: "🔥 حط apiKey الصحيح",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let finalLink="";
let score=0;
let level=1;
let time=10;
let savedMessage="";
let timer;
let spawnInterval;

// إنشاء الرابط
function start(){

  let u=document.getElementById("username").value;
  let m=document.getElementById("msg").value;

  if(u==""||m==""){
    alert("عمر الخانات");
    return;
  }

  db.collection("messages").add({
    user:u,
    text:m
  }).then(docRef=>{

    finalLink = window.location.href.split("?")[0] + "?msg=" + docRef.id;

    document.getElementById("linkBox").style.display="block";
    document.getElementById("copyBtn").style.display="block";
    document.getElementById("startGameBtn").style.display="block";

    document.getElementById("linkBox").innerText = finalLink;

  });

}

// نسخ الرابط
function copyLink(){
  navigator.clipboard.writeText(finalLink);
  alert("✅ تم نسخ الرابط");
}

// بدء اللعبة
function goGame(){
  document.getElementById("form").style.display="none";
  document.getElementById("game").style.display="block";
  startLevel();
}

// المراحل
function startLevel(){

  score=0;
  time=10 + level*2;

  document.getElementById("score").innerText=score;
  document.getElementById("time").innerText=time;
  document.getElementById("info").innerText="Level: "+level+" | Time: "+time;

  timer=setInterval(()=>{
    time--;
    document.getElementById("time").innerText=time;

    if(time<=0){
      clearAll();
      lose();
    }
  },1000);

  spawn();
}

// العناصر
function spawn(){

  let speed = 800 - level*100;

  spawnInterval=setInterval(()=>{

    let el=document.createElement("div");

    let good=["❤️","🌹"];
    let bad=["💔","☠️"];

    let isBad=Math.random()<0.3;

    el.innerText = isBad ? bad[Math.floor(Math.random()*bad.length)] : good[Math.floor(Math.random()*good.length)];

    el.className="item";
    el.style.left=Math.random()*90+"%";
    el.style.top=Math.random()*90+"%";

    el.onclick=()=>{

      if(isBad){
        clearAll();
        lose();
        return;
      }

      score++;
      document.getElementById("score").innerText=score;
      el.remove();

      if(score >= 5 + level*2){
        clearAll();
        nextLevel();
      }
    };

    document.body.appendChild(el);

    setTimeout(()=>el.remove(),3000);

  },speed);

}

// تنظيف
function clearAll(){
  clearInterval(timer);
  clearInterval(spawnInterval);
}

// المرحلة التالية
function nextLevel(){
  level++;
  if(level>4){
    finish();
    return;
  }
  startLevel();
}

// خسارة
function lose(){
  alert("💔 خسرت!");
  location.reload();
}

// النهاية
function finish(){

  document.getElementById("final").style.display="block";

  let i=0;
  let text=savedMessage;
  let box=document.getElementById("final");

  box.innerHTML="<h2>💌 رسالة سرية</h2><p id='t'></p>";

  let interval=setInterval(()=>{
    document.getElementById("t").innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },40);
}

// قراءة الرابط (🔥 تم إصلاحها)
window.onload = async function(){

  const params = new URLSearchParams(window.location.search);
  const msgId = params.get("msg");

  if(msgId){

    document.getElementById("form").style.display="none";
    document.getElementById("game").style.display="block";

    let doc = await db.collection("messages").doc(msgId).get();

    if(doc.exists){
      savedMessage = doc.data().text;

      setTimeout(()=>{
        startLevel();
      },500);

    }else{
      alert("❌ الرسالة غير موجودة");
    }

  }

};

</script>

</body>
</html>
