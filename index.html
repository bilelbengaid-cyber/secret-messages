<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XMovies ULTRA</title>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:sans-serif}

/* NAV */
.nav{
  display:flex;justify-content:space-between;
  padding:15px 30px;background:#111;position:fixed;width:100%;
}
.logo{color:#e50914;font-size:26px;font-weight:bold}
.search{padding:8px;border:none;border-radius:5px}

/* HERO */
.hero{
  height:450px;
  background-size:cover;
  display:flex;flex-direction:column;
  justify-content:center;padding:40px;
}
.hero h1{font-size:50px}
.hero p{max-width:500px}

/* BUTTON */
.btn{
  padding:10px 15px;
  background:#e50914;border:none;color:white;
  border-radius:5px;margin-top:10px;cursor:pointer
}

/* SECTIONS */
.section{padding:20px;margin-top:20px}
.row{display:flex;overflow-x:auto}
.card{min-width:160px;margin:10px;transition:.3s;cursor:pointer}
.card img{width:100%;border-radius:10px}
.card:hover{transform:scale(1.1)}

/* MODAL */
.modal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.9);display:none;
  justify-content:center;align-items:center;
}
.modal-content{
  background:#111;padding:20px;border-radius:10px;width:400px
}
iframe{width:100%;height:200px}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">XMovies</div>
  <input class="search" placeholder="Search..." onkeyup="searchMovie(this.value)">
</div>

<div class="hero" id="hero">
  <h1 id="heroTitle"></h1>
  <p id="heroDesc"></p>
  <button class="btn" onclick="playTrailer()">▶ Watch Trailer</button>
</div>

<div class="section"><h2>🔥 Trending</h2><div class="row" id="trending"></div></div>
<div class="section"><h2>🎬 Action</h2><div class="row" id="action"></div></div>
<div class="section"><h2>❤️ Romance</h2><div class="row" id="romance"></div></div>
<div class="section"><h2>🎭 Drama</h2><div class="row" id="drama"></div></div>
<div class="section"><h2>📺 Series</h2><div class="row" id="series"></div></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="title"></h3>
    <p id="overview"></p>
    <iframe id="video" src=""></iframe>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>

const API_KEY="c22d71098b1bb51004d4137d208bcda2";
let currentId=0;

// عرض
function show(id,data){
  let c=document.getElementById(id);
  c.innerHTML="";

  data.forEach(item=>{
    if(!item.poster_path) return;

    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`<img src="https://image.tmdb.org/t/p/w300${item.poster_path}">`;

    d.onclick=()=>openModal(item);

    c.appendChild(d);
  });
}

// HERO
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>{
  let m=d.results[0];
  document.getElementById("hero").style.backgroundImage=
    `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
  document.getElementById("heroTitle").innerText=m.title;
  document.getElementById("heroDesc").innerText=m.overview;
  currentId=m.id;
});

// CATEGORIES
fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>show("trending",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`)
.then(r=>r.json()).then(d=>show("action",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749`)
.then(r=>r.json()).then(d=>show("romance",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=18`)
.then(r=>r.json()).then(d=>show("drama",d.results));

fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>show("series",d.results));

// SEARCH
function searchMovie(q){
  if(q.length<2) return;
  fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`)
  .then(r=>r.json())
  .then(d=>show("trending",d.results));
}

// MODAL + TRAILER
function openModal(item){
  document.getElementById("modal").style.display="flex";
  document.getElementById("title").innerText=item.title||item.name;
  document.getElementById("overview").innerText=item.overview;
  currentId=item.id;
  loadTrailer(item.media_type||"movie",item.id);
}

function loadTrailer(type,id){
  fetch(`https://api.themoviedb.org/3/${type}/${id}/videos?api_key=${API_KEY}`)
  .then(r=>r.json())
  .then(d=>{
    let v=d.results.find(v=>v.type==="Trailer");
    if(v){
      document.getElementById("video").src=
        "https://www.youtube.com/embed/"+v.key;
    }
  });
}

function playTrailer(){
  openModal({id:currentId,media_type:"movie",title:"Trailer",overview:""});
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("video").src="";
}

</script>

</body>
</html>
