<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Messages PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#1f1c2c,#928dab);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.form{
  background:white;
  width:380px;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  text-align:center;
}
input,textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ddd;
}
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ff2e63;
  color:white;
  font-size:16px;
  cursor:pointer;
}
.link{
  background:#f3f3f3;
  padding:10px;
  border-radius:10px;
  word-break:break-all;
}
#result{
  display:none;
}
</style>
</head>

<body>

<!-- FORM الكبيرة -->
<div class="form" id="form">
<h2>🔥 Secret Messages</h2>

<input id="name" placeholder="اسمك">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<textarea id="bio" placeholder="اكتب رسالتك هنا 💌"></textarea>

<button onclick="handle()">🚀 متابعة</button>
</div>

<!-- RESULT -->
<div class="form" id="result">
<h3>🔗 الرابط</h3>
<p class="link" id="link"></p>
<button onclick="copy()">📋 نسخ</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAtzAi4uskhYAMnS5jUFXnoqymCMuUYvn4",
  authDomain: "secret-messages-d0ac8.firebaseapp.com",
  projectId: "secret-messages-d0ac8",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let params = new URLSearchParams(window.location.search);
let user = params.get("user");
let msgId = params.get("msg");

// 🔥 قراءة الرسالة
if(msgId){
  document.body.innerHTML = "⏳ تحميل...";

  setTimeout(async ()=>{
    let doc = await db.collection("messages").doc(msgId).get();

    if(doc.exists){
      document.body.innerHTML = `
        <div style="text-align:center;color:white;margin-top:100px;">
          <h1>💌 رسالة سرية</h1>
          <div style="background:#222;padding:20px;border-radius:20px;margin:20px;">
            ${doc.data().text}
          </div>
        </div>
      `;

      await db.collection("messages").doc(msgId).delete();

    } else {
      document.body.innerHTML = "<h2 style='color:white;'>❌ الرسالة غير موجودة</h2>";
    }
  },1000);
}

// 🔥 الزر الرئيسي
function handle(){

  let u = document.getElementById("username").value;
  let m = document.getElementById("bio").value;

  // إذا داخل برابط → إرسال رسالة
  if(user){
    if(m==""){alert("اكتب رسالة");return;}

    db.collection("messages").add({
      user:user,
      text:m
    }).then((docRef)=>{

      let link = window.location.href.split("?")[0] + "?msg=" + docRef.id;

      alert("📩 رابط الرسالة:\n" + link);
    });

  } else {
    // إنشاء رابط خاص بك
    if(u==""){alert("اكتب username");return;}

    let link = window.location.href.split("?")[0]+"?user="+u;

    document.getElementById("form").style.display="none";
    document.getElementById("result").style.display="block";
    document.getElementById("link").innerText = link;
  }
}

// نسخ الرابط
function copy(){
  navigator.clipboard.writeText(document.getElementById("link").innerText);
  alert("تم النسخ 🔥");
}

</script>

</body>
</html>
