<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b0b0b;
  font-family:sans-serif;
}

.box{
  background:#111;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:350px;
  text-align:center;
}

h2{color:white;margin-bottom:15px;}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#e50914;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* Instagram button */
.insta{
  margin-top:20px;
  cursor:pointer;
}

.insta img{
  width:60px;
  height:60px;
}
</style>

</head>

<body>

<div class="box">
  <h2>🎬 XMovies</h2>

  <input id="user" placeholder="Email or Phone">
  <input id="pass" type="password" placeholder="Password">
  <input id="age" type="number" placeholder="Age">

  <button onclick="go()">Sign Up 🚀</button>

  <!-- Instagram -->
  <div class="insta" onclick="window.location='insta.html'">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
  </div>

</div>

<script>
function go(){
  window.location.href="movies.html"; // رابط موقعك
}
</script>

</body>
</html>
