<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMovies Ultra</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:sans-serif;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  position:fixed;
  width:100%;
  z-index:1000;
}

.logo{
  color:#e50914;
  font-size:22px;
  font-weight:bold;
}

/* HERO */
.hero{
  height:400px;
  background-size:cover;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
  margin-top:60px;
  background-position:center;
}

.hero h1{
  font-size:30px;
}

.hero p{
  font-size:14px;
  max-width:500px;
}

/* ROW */
.section{padding:15px;}

.row{
  display:flex;
  overflow-x:auto;
  gap:20px;
}

/* 🔥 CARD (مثل الصورة) */
.card{
  min-width:200px;
  border-radius:15px;
  overflow:hidden;
  background:#111;
  position:relative;
  transition:.3s;
}

.card img{
  width:100%;
  height:280px;
  object-fit:cover;
}

/* 🔥 INFO فوق الصورة */
.overlay{
  position:absolute;
  bottom:0;
  background:linear-gradient(transparent,black);
  width:100%;
  padding:10px;
}

.title{
  font-size:14px;
  font-weight:bold;
}

.rating{
  color:gold;
  font-size:13px;
}

/* 🔥 Hover */
.card:hover{
  transform:scale(1.1);
}

/* PLAYER */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* 📱 MOBILE */
@media(max-width:600px){

  .card{
    min-width:170px;
  }

  .card img{
    height:240px;
  }

}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">XMovies</div>
</div>

<div class="hero" id="hero">
  <h1 id="title"></h1>
  <p id="desc"></p>
</div>

<div class="section"><h2>🔥 Trending</h2><div class="row" id="trending"></div></div>
<div class="section"><h2>🎬 Action</h2><div class="row" id="action"></div></div>
<div class="section"><h2>❤️ Romance</h2><div class="row" id="romance"></div></div>

<div class="modal" id="modal">
  <iframe id="player"></iframe>
</div>

<script>

const API_KEY="c22d71098b1bb51004d4137d208bcda2";

/* 🔥 ترجمة */
async function translate(text){
  try{
    let r=await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|ar");
    let d=await r.json();
    return d.responseData.translatedText;
  }catch{
    return text;
  }
}

/* عرض */
async function show(id,data,type="movie"){
  let container=document.getElementById(id);
  container.innerHTML="";

  for(let item of data){

    if(!item.poster_path) continue;

    let arDesc=await translate(item.overview);

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
      
      <div class="overlay">
        <div class="title">${item.title || item.name}</div>
        <div class="rating">⭐ ${item.vote_average}</div>
        <div style="font-size:11px;">${arDesc.slice(0,80)}...</div>
      </div>
    `;

    div.onclick=()=>openPlayer(item.id,type);

    container.appendChild(div);
  }
}

/* HERO */
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(r=>r.json())
.then(async d=>{
  let m=d.results[0];

  document.getElementById("hero").style.backgroundImage=
  `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;

  document.getElementById("title").innerText=m.title;

  let ar=await translate(m.overview);
  document.getElementById("desc").innerText=ar;
});

/* DATA */
fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>show("trending",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`)
.then(r=>r.json()).then(d=>show("action",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749`)
.then(r=>r.json()).then(d=>show("romance",d.results));

/* PLAYER */
function openPlayer(id,type="movie"){
  document.getElementById("modal").style.display="block";
  document.getElementById("player").src =
    "https://vidsrc.xyz/embed/" + type + "/" + id;
}

</script>

</body>
</html>
