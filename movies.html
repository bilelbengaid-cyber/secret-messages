<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMovies Cards</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:sans-serif;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* IMAGE */
.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

/* CONTENT */
.card-content{
  padding:10px;
}

.title{
  font-size:16px;
  font-weight:bold;
}

.year{
  font-size:12px;
  color:#aaa;
}

.rating{
  color:gold;
  margin:5px 0;
}

/* DESCRIPTION */
.desc{
  font-size:13px;
  color:#ccc;
  max-height:60px;
  overflow:hidden;
}

/* 🔥 RESPONSIVE للهاتف */
@media(max-width:600px){
  .card img{
    height:400px; /* أكبر في الهاتف */
  }

  .title{
    font-size:18px;
  }

  .desc{
    font-size:14px;
  }
}
</style>

</head>

<body>

<div class="container" id="movies"></div>

<script>

const API_KEY = "c22d71098b1bb51004d4137d208bcda2";

function showMovies(data){
  let container = document.getElementById("movies");
  container.innerHTML = "";

  data.forEach(m => {

    if(!m.poster_path) return;

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
      <div class="card-content">
        <div class="title">${m.title || m.name}</div>
        <div class="year">${(m.release_date || "").slice(0,4)}</div>
        <div class="rating">⭐ ${m.vote_average}</div>
        <div class="desc">${m.overview || "No description available"}</div>
      </div>
    `;

    container.appendChild(card);
  });
}

/* 🔥 جلب أفلام */
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(res => res.json())
.then(data => showMovies(data.results));

</script>

</body>
</html>
