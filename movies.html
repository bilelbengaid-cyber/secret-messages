<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMovies ULTRA</title>

<style>
body{margin:0;background:#0b0b0b;color:white;font-family:sans-serif}

/* NAV */
.nav{
  display:flex;justify-content:space-between;
  padding:15px 20px;background:#111;position:fixed;width:100%;z-index:10
}
.logo{color:#e50914;font-size:22px;font-weight:bold}
.search{padding:8px;border:none;border-radius:5px;width:120px}

/* SECTIONS */
.section{padding:70px 15px 20px}
.row{display:flex;overflow-x:auto}

/* CARD */
.card{
  min-width:180px;
  margin:10px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  transition:.3s;
}
.card:hover{transform:scale(1.05)}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

/* INFO */
.info{padding:10px}
.title{font-size:14px;font-weight:bold}
.rating{color:gold;font-size:13px;margin:3px 0}
.desc{
  font-size:12px;
  color:#ccc;
  max-height:50px;
  overflow:hidden;
}

/* 🔥 الهاتف */
@media(max-width:600px){
  .card{
    min-width:220px; /* أكبر في الهاتف */
  }
  .card img{
    height:300px;
  }
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">XMovies</div>
  <input class="search" placeholder="Search..." onkeyup="searchMovie(this.value)">
</div>

<div class="section">
  <h2>🔥 Trending</h2>
  <div class="row" id="trending"></div>
</div>

<div class="section">
  <h2>🎬 Action</h2>
  <div class="row" id="action"></div>
</div>

<div class="section">
  <h2>❤️ Romance</h2>
  <div class="row" id="romance"></div>
</div>

<script>

const API_KEY="c22d71098b1bb51004d4137d208bcda2";

/* 🔥 ترجمة للعربي */
async function translateToArabic(text){
  try{
    let res = await fetch("https://api.mymemory.translated.net/get?q="+encodeURIComponent(text)+"&langpair=en|ar");
    let data = await res.json();
    return data.responseData.translatedText;
  }catch{
    return text;
  }
}

/* عرض */
async function show(id,data){

  let c=document.getElementById(id);
  c.innerHTML="";

  for(let item of data){

    if(!item.poster_path) continue;

    let desc = item.overview || "No description";

    // 🔥 ترجمة
    let arDesc = await translateToArabic(desc);

    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
      <div class="info">
        <div class="title">${item.title || item.name}</div>
        <div class="rating">⭐ ${item.vote_average}</div>
        <div class="desc">${arDesc}</div>
      </div>
    `;

    c.appendChild(d);
  }
}

/* API */
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>show("trending",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`)
.then(r=>r.json()).then(d=>show("action",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749`)
.then(r=>r.json()).then(d=>show("romance",d.results));

/* SEARCH */
function searchMovie(q){
  if(q.length<2) return;
  fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`)
  .then(r=>r.json())
  .then(d=>show("trending",d.results));
}

</script>

</body>
</html>
