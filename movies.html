<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMovies Pro</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:sans-serif;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  position:fixed;
  width:100%;
  z-index:1000;
}

.logo{
  color:#e50914;
  font-size:22px;
  font-weight:bold;
}

.search{
  padding:6px;
  border-radius:5px;
  border:none;
}

/* HERO */
.hero{
  height:400px;
  background-size:cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
  margin-top:60px;
}

.hero h1{font-size:30px;}
.hero p{font-size:14px;}

.btn{
  background:#e50914;
  border:none;
  padding:10px;
  border-radius:5px;
  color:white;
  margin-top:10px;
}

/* SECTION */
.section{padding:15px;}
.row{
  display:flex;
  overflow-x:auto;
  gap:15px;
}

/* рҹ”Ҙ CARD NEW STYLE */
.card{
  min-width:180px;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  transition:.3s;
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* INFO ШӘШӯШӘ Ш§Щ„ШөЩҲШұШ© */
.card-info{
  padding:10px;
}

.title{
  font-size:14px;
  font-weight:bold;
}

.type{
  font-size:12px;
  color:#aaa;
}

.rating{
  font-size:13px;
  color:gold;
}

/* Hover */
.card:hover{
  transform:scale(1.08);
}

/* PLAYER */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* рҹ“ұ MOBILE */
@media(max-width:600px){

  .card{
    min-width:140px;
  }

  .card img{
    height:200px;
  }

  .hero{
    height:350px;
  }

}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">XMovies</div>
  <input class="search" placeholder="Search..." onkeyup="searchMovie(this.value)">
</div>

<div class="hero" id="hero">
  <h1 id="title"></h1>
  <p id="desc"></p>
  <button class="btn" onclick="playHero()">в–¶ Watch Now</button>
</div>

<div class="section"><h2>рҹ”Ҙ Trending</h2><div class="row" id="trending"></div></div>
<div class="section"><h2>рҹҺ¬ Action</h2><div class="row" id="action"></div></div>
<div class="section"><h2>вқӨпёҸ Romance</h2><div class="row" id="romance"></div></div>
<div class="section"><h2>рҹҺӯ Drama</h2><div class="row" id="drama"></div></div>
<div class="section"><h2>рҹ“ә Series</h2><div class="row" id="series"></div></div>

<div class="modal" id="modal">
  <iframe id="player"></iframe>
</div>

<script>

const API_KEY="c22d71098b1bb51004d4137d208bcda2";
let heroId=0;

/* Ш№ШұШ¶ */
function show(id,data,type="movie"){
  let container=document.getElementById(id);
  container.innerHTML="";

  data.forEach(item=>{
    if(!item.poster_path) return;

    let div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="https://image.tmdb.org/t/p/w300${item.poster_path}">
      
      <div class="card-info">
        <div class="title">${item.title || item.name}</div>
        <div class="type">${type}</div>
        <div class="rating">вӯҗ ${item.vote_average}</div>
      </div>
    `;

    div.onclick=()=>openPlayer(item.id,type);

    container.appendChild(div);
  });
}

/* HERO */
fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`)
.then(r=>r.json())
.then(d=>{
  let m=d.results[0];

  document.getElementById("hero").style.backgroundImage=
  `url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;

  document.getElementById("title").innerText=m.title;
  document.getElementById("desc").innerText=m.overview;

  heroId=m.id;
});

/* DATA */
fetch(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>show("trending",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`)
.then(r=>r.json()).then(d=>show("action",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=10749`)
.then(r=>r.json()).then(d=>show("romance",d.results));

fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=18`)
.then(r=>r.json()).then(d=>show("drama",d.results));

fetch(`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}`)
.then(r=>r.json()).then(d=>show("series",d.results,"TV"));

/* SEARCH */
function searchMovie(q){
  if(q.length<2) return;

  fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&query=${q}`)
  .then(r=>r.json())
  .then(d=>show("trending",d.results));
}

/* PLAYER */
function openPlayer(id,type="movie"){
  document.getElementById("modal").style.display="flex";
  document.getElementById("player").src =
    "https://vidsrc.xyz/embed/" + type + "/" + id;
}

function playHero(){
  openPlayer(heroId);
}

</script>

</body>
</html>
